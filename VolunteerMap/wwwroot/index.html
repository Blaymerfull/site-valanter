<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Russia Map | Focused Region</title>
    <style>
        body {
    margin: 0;
    background-color: #050505;
    color: #fff;
    font-family: 'Courier New', Courier, monospace;
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
}

        /* Фиксированная нижняя панель для кнопок админа */
        .admin-bottom-panel {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            /* Флекс-контейнер выстраивает всё в один ровный ряд */
            display: flex;
            align-items: center; /* Центрирует все элементы строго по вертикали */
            justify-content: center; /* Центрирует по горизонтали */
            gap: 30px; /* Аккуратный фиксированный отступ между кнопками и крестиком */

            z-index: 1000002;
            pointer-events: none; /* Пропускаем клики мимо прозрачного фона панели */
        }

        /* Общий стиль для кнопок модерации */
        .admin-action-btn {
            pointer-events: auto; /* Возвращаем кликабельность кнопкам */
            border: 1px solid rgba(255, 255, 255, 0.2);
            /* ЖЕСТКО ФИКСИРУЕМ ВЫСОТУ */
            height: 44px;
            padding: 0 25px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.95em;
            cursor: pointer;
            color: white;
            box-sizing: border-box;
            transition: background 0.3s, transform 0.3s, border-color 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

            /* Кнопка "Изменить" (слева от крестика) */
            .admin-action-btn.edit-btn {
                background: #f39c12;
            }

                .admin-action-btn.edit-btn:hover {
                    background: #e67e22;
                    transform: scale(1.05);
                }

            .admin-action-btn.delete-btn {
                background: #e74c3c;
            }

                .admin-action-btn.delete-btn:hover {
                    background: #c0392b;
                    transform: scale(1.05);
                }

/* Контейнер поиска по центру панели */
.search-container {
    position: relative;
    pointer-events: auto; /* Разрешаем клики */
    width: 450px;
    margin: 0 20px;
}

.search-wrapper {
    display: flex;
    background: rgba(0, 0, 0, 0.75);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 4px;
    overflow: hidden;
    transition: border-color 0.3s;
}

.search-wrapper:focus-within {
    border-color: #e50914;
}

#search-input {
    flex: 1;
    background: transparent;
    border: none;
    padding: 10px 15px;
    color: white;
    font-size: 0.95em;
    outline: none;
}

#search-filter {
    background: rgba(30, 30, 30, 0.9);
    border: none;
    border-left: 1px solid rgba(255, 255, 255, 0.15);
    color: #ccc;
    padding: 0 10px;
    cursor: pointer;
    outline: none;
    font-size: 0.85em;
}

/* Выпадающее меню результатов */
.search-results-dropdown {
    position: absolute;
    top: calc(100% + 5px);
    left: 0;
    width: 100%;
    background: #141414;
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 4px;
    max-height: 300px;
    overflow-y: auto;
    display: none;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    z-index: 1000;
}

.search-result-item {
    padding: 12px 15px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    cursor: pointer;
    transition: background 0.2s;
    color: white;
}

.search-result-item:hover {
    background: rgba(255, 255, 255, 0.08);
}

.search-result-item h4 {
    margin: 0 0 4px 0;
    color: #e50914;
    font-size: 0.95em;
}

.search-result-item p {
    margin: 0;
    font-size: 0.8em;
    color: #aaa;
}

.search-result-item:last-child {
    border-bottom: none;
}




/* Контейнер для кнопок управления */
.auth-panel {
    position: fixed; /* Именно fixed, чтобы не улетала при скролле */
    top: 30px;
    left: 0;
    width: 100%;
    padding: 0 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 600;
    pointer-events: none;
    box-sizing: border-box; /* Чтобы паддинги не расширяли экран */
}

.left-controls, .right-controls {
    display: flex;
    align-items: center;
    pointer-events: auto; /* Возвращаем кликабельность самим кнопкам */
}

/* Общий стиль для верхних кнопок */
.nav-btn {
    background: rgba(0, 0, 0, 0.6);
    color: white;
    border: 1px solid rgba(255, 255, 255, 0.2);
    padding: 10px 20px;
    border-radius: 4px;
    font-weight: 500;
    cursor: pointer;
    margin-right: 15px;
    transition: background 0.3s, border-color 0.3s;
}

.nav-btn:hover {
    background: #e50914; /* Фирменный красный Netflix */
    border-color: #e50914;
}

.nav-btn:last-child {
    margin-right: 0;
}

/* Общие стили для новых оверлеев */
.custom-modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: rgba(0, 0, 0, 0.85);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 10000;
    opacity: 0;
    transition: opacity 0.4s ease;
}

/* Контентные блоки */
.custom-modal-content {
    background: #141414;
    border: 1px solid rgba(255, 255, 255, 0.1);
    padding: 40px;
    border-radius: 8px;
    position: relative;
    width: 100%;
    color: white;
    box-shadow: 0 0 40px rgba(0, 0, 0, 0.7);
}

.auth-box { max-width: 400px; }
.form-box { max-width: 600px; }

.modal-title {
    margin-top: 0;
    margin-bottom: 25px;
    font-size: 1.8em;
    font-weight: bold;
}

/* Элементы форм */
.input-group {
    margin-bottom: 20px;
}

.input-group input, 
.input-group textarea, 
.input-group select {
    width: 100%;
    padding: 14px;
    background: #333;
    border: none;
    border-radius: 4px;
    color: white;
    font-size: 1em;
    box-sizing: border-box;
}

.input-group input:focus, 
.input-group textarea:focus, 
.input-group select:focus {
    background: #454545;
    outline: 1px solid #e50914;
}

.input-group select option {
    background: #141414;
    color: white;
}

/* Кнопки действий */
.action-btn {
    width: 100%;
    padding: 14px;
    background: #e50914;
    color: white;
    border: none;
    border-radius: 4px;
    font-size: 1.1em;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.2s;
}

.action-btn:hover {
    background: #b20710;
}

/* Текст переключения */
.switch-form-text {
    margin-top: 20px;
    font-size: 0.9em;
    color: #aaa;
    text-align: center;
}

.switch-form-text span {
    color: white;
    cursor: pointer;
    text-decoration: underline;
}

.switch-form-text span:hover {
    color: #e50914;
}

/* Кнопка закрытия модалки */
.custom-close-modal {
    position: absolute;
    top: 20px;
    right: 20px;
    font-size: 28px;
    color: #aaa;
    cursor: pointer;
}

.custom-close-modal:hover {
    color: white;
}


#map-wrapper {
    width: 90vw;
    height: 80vh;
    transition: opacity 0.8s ease; 
}

svg { 
    width: 100%; 
    height: 100%; 
    pointer-events: all; 
    transform-origin: 0 0 !important; 
    transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
}

path {
    fill: #0a0a0a !important;
    stroke: #333 !important;
    stroke-width: 0.5;
    transition: fill 0.3s, stroke 0.3s, opacity 0.8s ease;
    cursor: pointer;
    vector-effect: non-scaling-stroke; 
}

path:hover {
    fill: #111 !important;
    stroke: #fff !important;
}

.focused-region {
    fill: #151515 !important;
    stroke: #fff !important;
    stroke-width: 1.5;
    filter: drop-shadow(0 0 25px rgba(255, 255, 255, 0.5));
    pointer-events: none;
}

.scanner-corner {
    position: fixed;
    width: 40px; height: 40px;
    border: 1px solid #fff;
    opacity: 0;
    transition: 0.5s;
    z-index: 100;
}
#tl { top: 30px; left: 30px; border-right: none; border-bottom: none; }
#tr { top: 30px; right: 30px; border-left: none; border-bottom: none; }
#bl { bottom: 30px; left: 30px; border-right: none; border-top: none; }
#br { bottom: 30px; right: 30px; border-left: none; border-top: none; }

.scanning .scanner-corner { 
    opacity: 1; 
    animation: cornerPulse 2s infinite alternate ease-in-out;
}

@keyframes cornerPulse {
    from { transform: scale(1); opacity: 0.5; }
    to { transform: scale(1.1); opacity: 1; }
}

#tooltip {
    position: fixed;
    pointer-events: none;
    background: #000;
    border: 1px solid #fff;
    padding: 8px 15px;
    text-transform: uppercase;
    letter-spacing: 2px;
    font-size: 12px;
    opacity: 0;
    z-index: 1000;
}

#back-button {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    background: #000;
    border: 1px solid #fff;
    color: #fff;
    padding: 12px 30px;
    cursor: pointer;
    opacity: 0;
    visibility: hidden;
    transition: 0.5s;
    z-index: 1000 !important;
    letter-spacing: 4px;
}
#back-button.visible { opacity: 1; visibility: visible; }
#back-button:hover { background: #fff; color: #000; }

#region-title-display {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 4vw;
    font-weight: 100;
    text-transform: uppercase;
    letter-spacing: 15px;
    color: #fff;
    opacity: 0;
    z-index: 500;
    text-align: center;
    pointer-events: none;
    transition: all 2s cubic-bezier(0.19, 1, 0.22, 1);
    filter: blur(10px);
}

#region-title-display.visible {
    opacity: 1;
    filter: blur(0);
    letter-spacing: 25px;
    text-shadow: 0 0 30px rgba(255, 255, 255, 0.6);
}

.map-hidden {
    opacity: 0 !important;
    transform: scale(1.2);
    transition: opacity 1s ease, transform 1.5s ease-in !important;
    pointer-events: none !important; 
}

#regional-map-container path {
    fill: #919191 !important;
    stroke: rgba(255, 255, 255, 0.3) !important;
    stroke-width: 0.5px !important;
    transition: all 0.4s ease;
    vector-effect: non-scaling-stroke;
    z-index: 501;
}

#regional-map-container path:hover {
    fill: #383838 !important;
    stroke: #ffffff !important;
    stroke-width: 1px !important;
    filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.8)) !important;
    cursor: pointer;
}

#regional-map-container [inkscape\:label="Border"],
#regional-map-container [id="path5"] {
    fill: none !important;
    stroke: #444444 !important;
    stroke-width: 1.5px !important;
    pointer-events: none !important;
    filter: none !important;
}

#regional-map-container svg {
    background: transparent !important;
}

.centers-hidden {
    display: none;
    opacity: 0;
    transition: opacity 0.8s ease;
}

.centers-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
    padding: 40px;
}

.center-card {
    background: #1a1a1a; 
    border: 1px solid rgba(255, 255, 255, 0.1);
    will-change: transform, opacity;
    border-radius: 12px;
    padding: 25px;
    color: white;
    opacity: 0;
    transform: translateY(30px);
    transition: transform 0.3s ease, background 0.3s ease;
}

.center-card:hover {
    transform: scale(1.05);
    background: rgba(255, 255, 255, 0.1);
}

.fade-out {
    opacity: 0 !important;
    pointer-events: none;
}

#regional-map-container, #map-wrapper {
    pointer-events: auto !important;
}

#regional-map-container svg path, #map-wrapper svg path {
    pointer-events: auto !important;
    cursor: pointer;
}

.hidden-completely {
    display: none !important;
}

#centers-view {
     position: fixed; /* Фиксируем на весь экран поверх карты */
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 10;
    
    /* ВКЛЮЧАЕМ СВЕРХУ ПАДДИНГ, чтобы карточки не залезали под поиск
    padding-top: 140px; */
    
    /* РАЗРЕШАЕМ СКРОЛЛ только внутри этого контейнера */
    overflow-y: auto; 
    box-sizing: border-box;
    background-color: #050505; /* Задаем фон, чтобы карта сзади не просвечивала */
}

.centers-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 30px;
    padding: 20px 10% 100px 10%; /* Добавили отступ снизу */
}

.center-card {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    padding: 25px;
    color: white;
    opacity: 0;
    transform: translateY(30px);
    transition: transform 0.4s ease, background 0.4s ease, border-color 0.4s ease;
}

.center-card.animate {
    animation: reveal 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
}

@keyframes reveal {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.center-card:hover {
    background: rgba(255, 255, 255, 0.12);
    border-color: #e50914;
    transform: scale(1.03);
    cursor: pointer;
}

.center-card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    border-radius: 8px;
    margin-bottom: 15px;
}

.card-description {
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 15px;
    font-size: 0.9em;
    opacity: 0.8;
}

#modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: rgba(0, 0, 0, 0.95);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 99999;
    opacity: 0;
    transition: opacity 0.4s ease;
}
.modal-content {
    background: #141414;
    width: 90%;
    max-width: 900px;
    height: auto;
    max-height: 85vh;
    border-radius: 15px;
    overflow-y: auto;
    position: relative;
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 0 50px rgba(0,0,0,1);
    animation: modalSlideUp 0.5s ease;
    padding-bottom: 100px;
}

        .close-modal {
            pointer-events: auto;
            /* ЖЕСТКО ЗАДАЕМ КВАДРАТНУЮ ОБЛАСТЬ */
            width: 44px !important;
            height: 44px !important;
            /* КРИТИЧНО: запрещаем флекс-контейнеру сжимать этот блок */
            flex-shrink: 0;
            display: flex !important;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 36px; /* Размер самого символа "X" внутри квадрата */
            font-weight: bold;
            line-height: 1; /* Возвращаем стандартную высоту строки */

            cursor: pointer;
            box-sizing: border-box;
            transition: transform 0.3s ease, color 0.3s ease;
            text-shadow: 0 0 20px rgba(0,0,0,0.8);
            /* Раскомментируй строку ниже на время проверки, чтобы увидеть реальную область клика */
            /* background: rgba(255,255,255,0.1); border-radius: 4px; */
        }

            .close-modal:hover {
                color: #e50914;
                transform: scale(1.15);
            }

@keyframes modalSlideUp {
    from { transform: translateY(50px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}
    </style>
</head>
<body>

    <div class="auth-panel">
        <!-- Левый верхний угол (Доступно после входа) -->
        <div class="left-controls">
            <button id="add-center-btn" class="nav-btn" style="display: none;">Добавить волонтерский центр</button>
            <button id="view-apps-btn" class="nav-btn" style="display: none;">Посмотреть заявки</button>
        </div>


        <!-- Окно поиска -->
        <div class="search-container">
            <div class="search-wrapper">
                <input type="text" id="search-input" placeholder="Поиск волонтерского центра...">
                <select id="search-filter">
                    <option value="all">Везде</option>
                    <option value="region">По региону</option>
                    <option value="district">По району</option>
                    <option value="name">По названию</option>
                </select>
            </div>
            <!-- Выпадающий список результатов поиска -->
            <div id="search-results" class="search-results-dropdown"></div>
        </div>        


        <!-- Правый верхний угол -->
        <div class="right-controls">
            <button id="account-btn" class="nav-btn">Личный кабинет</button>
            <span id="user-email-display" style="color: white; margin-right: 15px; display: none;"></span>
            <button id="logout-btn" class="nav-btn" style="display: none;">Выйти</button>
        </div>
    </div>

    <!-- Модальное окно авторизации (Вход / Регистрация) -->
<div id="auth-modal" class="custom-modal-overlay">
    <div class="custom-modal-content auth-box">
        <span class="custom-close-modal" id="close-auth-btn">&times;</span>
        
        <!-- Форма Входа -->
        <div id="login-form-block">
            <h2 class="modal-title">Вход</h2>
            <form id="login-form">
                <div class="input-group">
                    <input type="email" id="login-email" placeholder="Email" required>
                </div>
                <div class="input-group">
                    <input type="password" id="login-password" placeholder="Пароль" required>
                </div>
                <button type="submit" class="action-btn">Войти</button>
            </form>
            <p class="switch-form-text">Впервые на сайте? <span id="to-register-btn">Зарегистрироваться</span></p>
        </div>

        <!-- Форма Регистрации -->
        <div id="register-form-block" style="display: none;">
            <h2 class="modal-title">Регистрация</h2>
            <form id="register-form">
                <div class="input-group">
                    <input type="email" id="register-email" placeholder="Email" required>
                </div>
                <div class="input-group">
                    <input type="password" id="register-password" placeholder="Пароль" required>
                </div>
                <div class="input-group">
                    <input type="password" id="register-confirm-password" placeholder="Повторите пароль" required>
                </div>
                <button type="submit" class="action-btn">Создать аккаунт</button>
            </form>
            <p class="switch-form-text">Уже есть аккаунт? <span id="to-login-btn">Войти</span></p>
        </div>
    </div>
</div>

<!-- Модальное окно подачи заявки (Форма добавления центра) -->
<div id="add-center-modal" class="custom-modal-overlay">
    <div class="custom-modal-content form-box">
        <span class="custom-close-modal" id="close-add-modal-btn">&times;</span>
        <h2 class="modal-title">Подать заявку на создание центра</h2>
        <form id="center-application-form">
            <!-- Скрытое поле для хранения ID редактируемой заявки -->
            <input type="hidden" id="edit-app-id" value="">
            <input type="hidden" id="edit-center-id" value="">
            <div class="input-group">
                <input type="text" id="app-name" placeholder="Название волонтерского центра" required>
            </div>
            <div class="input-group">
                <textarea id="app-description" placeholder="Описание деятельности центра" rows="4" required></textarea>
            </div>
            <div class="input-group">
                <input type="text" id="app-address" placeholder="Фактический адрес (Город, улица, дом)" required>
            </div>
            <div class="input-group">
                <input type="text" id="app-contacts" placeholder="Контакты (Телефон, Email, Ссылка на ВК)" required>
            </div>
            <div class="input-group">
                <input type="url" id="app-image" placeholder="Ссылка на изображение/логотип (URL)">
            </div>
            <div class="input-group">
                <select id="app-region" required>
                    <option value="" disabled selected>Выберите регион / область</option>
                    <!-- Сюда JS подгрузит все регионы из таблицы Regions -->
                </select>
            </div>

            <div class="input-group">
                <select id="app-district" required disabled>
                    <option value="" disabled selected>Сначала выберите регион</option>
                    <!-- Сюда JS подгрузит районы выбранного региона -->
                </select>
            </div>
            <button type="submit" class="action-btn">Отправить на модерацию</button>
        </form>
    </div>
</div>

<div id="view-apps-modal" class="custom-modal-overlay">
    <div class="custom-modal-content form-box" style="max-width: 800px;">
        <span class="custom-close-modal" id="close-apps-modal-btn">&times;</span>
        <h2 class="modal-title">Модерация заявок от пользователей</h2>
        <div id="apps-list-container" style="max-height: 60vh; overflow-y: auto; padding-right: 10px;">
            <!-- Сюда JS подставит список заявок на проверку -->
        </div>
    </div>
</div>

    <div id="tl" class="scanner-corner"></div>
    <div id="tr" class="scanner-corner"></div>
    <div id="bl" class="scanner-corner"></div>
    <div id="br" class="scanner-corner"></div>

    <div id="tooltip"></div>

    <div id="region-title-display"></div>
    <div id="regional-map-container" style="position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); width:70vw; height:70vh; display:none; opacity:0; transition: opacity 1s; z-index: 501;"></div>

        <div id="centers-list" class="centers-grid"></div>

    <div id="admin-fixed-panel" class="admin-bottom-panel" style="display: none;">
        <button id="admin-edit-center-btn" class="admin-action-btn edit-btn">Изменить</button>
        
        <!-- Крестик закрытия карточки теперь сидит по центру панели -->
        <span class="close-modal" id="close-modal">&times;</span>
        
        <button id="admin-delete-center-btn" class="admin-action-btn delete-btn">Удалить</button>

<script>
   const wrapper = document.getElementById('map-wrapper');
const tooltip = document.getElementById('tooltip');
const backBtn = document.getElementById('back-button');
const titleDisplay = document.getElementById('region-title-display');
const regionalContainer = document.getElementById('regional-map-container'); 


// Элементы управления авторизацией и заявками
const accountBtn = document.getElementById('account-btn');
const authModal = document.getElementById('auth-modal');
const closeAuthBtn = document.getElementById('close-auth-btn');

const addCenterBtn = document.getElementById('add-center-btn');
const addCenterModal = document.getElementById('add-center-modal');
const closeAddModalBtn = document.getElementById('close-add-modal-btn');

const logoutBtn = document.getElementById('logout-btn');
const userEmailDisplay = document.getElementById('user-email-display');

// Переключение Вход/Регистрация
const toRegisterBtn = document.getElementById('to-register-btn');
const toLoginBtn = document.getElementById('to-login-btn');
const loginBlock = document.getElementById('login-form-block');
const registerBlock = document.getElementById('register-form-block');

// ==========================================
// 7. ЛОГИКА ИНТЕЛЛЕКТУАЛЬНОГО ПОИСКА ЦЕНТРОВ
// ==========================================
const searchInput = document.getElementById('search-input');
const searchFilter = document.getElementById('search-filter');
const searchResults = document.getElementById('search-results');

let searchTimeout = null;

if (searchInput) {
    searchInput.addEventListener('input', function() {
        clearTimeout(searchTimeout);
        const query = this.value.trim();
        const filter = searchFilter.value;

        if (query.length < 2) {
            searchResults.style.display = 'none';
            searchResults.innerHTML = '';
            return;
        }

        // Задержка 300мс перед отправкой запроса на сервер (оптимизация)
        searchTimeout = setTimeout(() => {
            fetch(`/api/map/search?query=${encodeURIComponent(query)}&filter=${filter}`)
                .then(res => res.json())
                .then(data => {
                    searchResults.innerHTML = '';
                    
                    if (data.length === 0) {
                        searchResults.innerHTML = '<div class="search-result-item"><p style="text-align:center;">Ничего не найдено</p></div>';
                        searchResults.style.display = 'block';
                        return;
                    }

                    data.forEach(center => {
                        const item = document.createElement('div');
                        item.className = 'search-result-item';
                        item.innerHTML = `
                            <h4>${center.name}</h4>
                            <p>📍 ${center.locationInfo}</p>
                        `;

                        // Клик по результату поиска — открывает твою карточку openFullView
                        item.addEventListener('click', () => {
                            searchResults.style.display = 'none';
                            searchInput.value = ''; // Очищаем строку поиска
                            openFullView(center);   // Вызываем твою готовую модалку
                        });

                        searchResults.appendChild(item);
                    });

                    searchResults.style.display = 'block';
                })
                .catch(err => console.error("Ошибка поиска:", err));
        }, 300);
    });
}

// Закрываем выпадающий список поиска, если кликнули мимо него
document.addEventListener('click', function(e) {
    if (searchResults && !e.target.closest('.search-container')) {
        searchResults.style.display = 'none';
    }
});





// ==========================================
// ЛОГИКА ОТПРАВКИ ФОРМ АВТОРИЗАЦИИ И СЕССИИ
// ==========================================
const loginForm = document.getElementById('login-form');
const registerForm = document.getElementById('register-form');

const appRegionSelect = document.getElementById('app-region');
const appDistrictSelect = document.getElementById('app-district');

// ==========================================
// 6. ОТПРАВКА ФОРМЫ И МОДЕРАЦИЯ ЗАЯВОК (API)
// ==========================================
const appForm = document.getElementById('center-application-form');
const viewAppsBtn = document.getElementById('view-apps-btn');
const viewAppsModal = document.getElementById('view-apps-modal');
const closeAppsModalBtn = document.getElementById('close-apps-modal-btn');
const appsListContainer = document.getElementById('apps-list-container');

// Открытие и закрытие окна модерации для админа
if (viewAppsBtn) {
    viewAppsBtn.addEventListener('click', () => {
        showCustomModal(viewAppsModal);
        loadPendingApplications(); // Загружаем заявки из БД
    });
}
if (closeAppsModalBtn) {
    closeAppsModalBtn.addEventListener('click', () => hideCustomModal(viewAppsModal));
}

// А. Пользователь отправляет форму в БД
    if (appForm) {
        appForm.addEventListener('submit', function (e) {
            e.preventDefault();

            const currentUser = JSON.parse(localStorage.getItem('volunteer_user'));
            if (!currentUser) {
                alert("Ошибка сессии. Перезайдите в аккаунт.");
                return;
            }

            // 1. Безопасно получаем скрытые ID
            const editAppId = document.getElementById('edit-app-id') ? document.getElementById('edit-app-id').value : "";
            const editCenterId = document.getElementById('edit-center-id') ? document.getElementById('edit-center-id').value : "";

            console.log("Отправка формы. Текущие флаги режима: editAppId =", editAppId, "| editCenterId =", editCenterId);

            // 2. Получаем элементы формы
            const inputDistrict = document.getElementById('app-district');
            const inputName = document.getElementById('app-name');
            const inputDesc = document.getElementById('app-description');
            const inputAddr = document.getElementById('app-address');
            const inputCont = document.getElementById('app-contacts');
            const inputImg = document.getElementById('app-image');

            // Собираем объект данных
            const appData = {
                districtId: inputDistrict ? inputDistrict.value : "",
                name: inputName ? inputName.value : "",
                description: inputDesc ? inputDesc.value : "",
                address: inputAddr ? inputAddr.value : "",
                contacts: inputCont ? inputCont.value : "",
                imageUrl: inputImg ? inputImg.value : ""
            };

            // 3. УСЛОВИЯ МАРШРУТИЗАЦИИ (Определяем, куда слать данные)
            let url = '/api/applications';
            let method = 'POST';

            if (editCenterId && editCenterId !== "") {
                // РЕЖИМ 1: Админ правит УТВЕРЖДЕННЫЙ центр напрямую в основную БД!
                console.log("Сработало условие: Прямое обновление центра в БД. ID =", editCenterId);
                url = `/api/map/update-center/${editCenterId}`;
                method = 'PUT';
                appData.centerId = parseInt(editCenterId); // Передаем ID центра бэкенду
            }
            else if (editAppId && editAppId !== "") {
                // РЕЖИМ 2: Админ правит черновик ЗАЯВКИ в окне заявок
                console.log("Сработало условие: Редактирование черновика заявки. ID =", editAppId);
                url = `/api/applications/update/${editAppId}`;
                method = 'PUT';
            }
            else {
                // РЕЖИМ 3: Обычная подача заявки пользователем на модерацию
                console.log("Сработало условие: Создание новой заявки пользователем.");
                appData.userId = currentUser.userId;
            }

            // 4. Отправляем запрос
            fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(appData)
            })
                .then(async response => {
                    if (!response.ok) throw new Error('Не удалось обработать запрос к серверу.');
                    return response.json();
                })
                .then(data => {
                    alert(data.message);
                    appForm.reset();

                    // Сбрасываем все скрытые поля и селекторы в исходное состояние
                    if (document.getElementById('edit-app-id')) document.getElementById('edit-app-id').value = "";
                    if (document.getElementById('edit-center-id')) document.getElementById('edit-center-id').value = "";
                    if (document.getElementById('app-region')) document.getElementById('app-region').value = "";
                    if (document.getElementById('app-district')) {
                        document.getElementById('app-district').innerHTML = '<option value="" disabled selected>Сначала выберите регион</option>';
                        document.getElementById('app-district').disabled = true;
                    }

                    hideCustomModal(document.getElementById('add-center-modal'));

                    // Если мы правили утвержденный центр (Режим 1) — перезагружаем страницу, чтобы обновить карту
                    if (editCenterId) {
                        location.reload();
                    }
                    // Если правили черновик (Режим 2) — возвращаем админа к списку заявок
                    else if (editAppId) {
                        showCustomModal(document.getElementById('view-apps-modal'));
                        loadPendingApplications();
                    }
                })
                .catch(err => alert(err.message));
        });
    }

// Б. Админ загружает список ожидающих заявок
function loadPendingApplications() {
    if (!appsListContainer) return;
    appsListContainer.innerHTML = '<p style="color:#aaa;">Загрузка списка заявок...</p>';

    fetch('/api/applications/pending')
        .then(res => res.json())
        .then(apps => {
            appsListContainer.innerHTML = '';
            
            if (apps.length === 0) {
                appsListContainer.innerHTML = '<p style="color:#aaa; text-align:center;">Новых заявок на модерацию нет.</p>';
                return;
            }

            apps.forEach(app => {
                const item = document.createElement('div');
                item.style = "background:#222; border:1px solid #333; padding:20px; margin-bottom:15px; border-radius:6px;";
                item.innerHTML = `
                    <h3 style="color:#e50914; margin-top:0;">${app.name}</h3>
                    <p style="font-size:0.9em; opacity:0.8;">${app.description || 'Без описания'}</p>
                    <p style="font-size:0.85em;">📍 <b>Адрес:</b> ${app.address}</p>
                    <p style="font-size:0.85em;">📞 <b>Контакты:</b> ${app.contacts}</p>
                    ${app.imageUrl ? `<p style="font-size:0.85em; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">🖼️ <b>Ссылка на фото:</b> <a href="${app.imageUrl}" target="_blank" style="color:#aaa;">${app.imageUrl}</a></p>` : ''}
                    <div style="margin-top:15px; display:flex; gap:10px;">
                        <button onclick="moderateApp(${app.applicationId}, 'approve')" style="background:#2ecc71; color:white; border:none; padding:8px 15px; border-radius:4px; cursor:pointer; font-weight:bold;">Одобрить</button>
                        <button onclick="moderateApp(${app.applicationId}, 'reject')" style="background:#e74c3c; color:white; border:none; padding:8px 15px; border-radius:4px; cursor:pointer; font-weight:bold;">Отклонить</button>
                        <!-- НОВАЯ КНОПКА ИЗМЕНЕНИЯ -->
                        <button onclick="openEditAppForm(${JSON.stringify(app).replace(/"/g, '&quot;')})" style="background:#f39c12; color:white; border:none; padding:8px 15px; border-radius:4px; cursor:pointer; font-weight:bold;">Изменить</button>
                    </div>
                `;
                appsListContainer.appendChild(item);
            });
        })
        .catch(err => console.error("Ошибка загрузки заявок:", err));
}

// В. Функция одобрения / отклонения
window.moderateApp = function(id, action) {
    if (!confirm(`Вы уверены, что хотите ${action === 'approve' ? 'одобрить' : 'отклонить'} эту заявку?`)) return;

    fetch(`/api/applications/${action}/${id}`, { method: 'POST' })
        .then(res => res.json())
        .then(data => {
            alert(data.message);
            loadPendingApplications(); // Перезагружаем список
        })
        .catch(err => alert("Ошибка при обработке действия."));
};

// Функция открытия формы для редактирования заявки админом
    window.openEditAppForm = function (app) {
        // 1. Прячем окно со списком заявок и открываем форму
        hideCustomModal(document.getElementById('view-apps-modal'));
        const addModal = document.getElementById('add-center-modal');
        showCustomModal(addModal);

        // Переименовываем интерфейс под режим редактирования
        addModal.querySelector('.modal-title').innerText = "Редактирование заявки администратором";
        addModal.querySelector('.action-btn').innerText = "Сохранить изменения";

        // 2. Заполняем текстовые поля данными заявки
        document.getElementById('edit-app-id').value = app.applicationId;
        document.getElementById('app-name').value = app.name;
        document.getElementById('app-description').value = app.description || '';
        document.getElementById('app-address').value = app.address || '';
        document.getElementById('app-contacts').value = app.contacts || '';
        document.getElementById('app-image').value = app.imageUrl || '';

        // 3. Асинхронное заполнение выпадающих списков
        if (appRegionSelect && appDistrictSelect) {
            // Сначала ЖДЕМ, пока загрузятся регионы
            loadRegionsToForm().then(() => {
                // Теперь регионы точно есть в HTML. Выставляем нужный:
                appRegionSelect.value = app.regionId;

                // Включаем индикатор загрузки для районов
                appDistrictSelect.innerHTML = '<option value="" disabled selected>Загрузка районов...</option>';
                appDistrictSelect.disabled = true;

                // Запрашиваем районы для этой конкретной области
                return fetch(`/api/map/districts/${app.regionId}`);
            })
                .then(res => {
                    if (!res) return; // Если первый шаг упал
                    return res.json();
                })
                .then(districts => {
                    if (!districts) return;

                    appDistrictSelect.innerHTML = '<option value="" disabled selected>Выберите район расположения</option>';

                    districts.forEach(d => {
                        const opt = document.createElement('option');
                        opt.value = d.districtId;
                        opt.innerText = d.districtName;

                        // Проверяем совпадение ID района с заявкой (приводим к строке на всякий случай)
                        if (String(d.districtId) === String(app.districtId)) {
                            opt.selected = true;
                        }
                        appDistrictSelect.appendChild(opt);
                    });

                    appDistrictSelect.disabled = false; // Активируем список районов
                })
                .catch(err => {
                    console.error("Ошибка автоподгрузки районов:", err);
                    appDistrictSelect.innerHTML = '<option value="" disabled selected>Ошибка загрузки</option>';
                });
        }
    };



// 1. Функция загрузки ВСЕХ регионов при открытии модального окна
    function loadRegionsToForm() {
        if (!appRegionSelect) return Promise.resolve();

        // Если регионы уже загружены, сразу говорим "готово"
        if (appRegionSelect.children.length > 1) return Promise.resolve();

        return fetch('/api/map/regions')
            .then(res => res.json())
            .then(regions => {
                regions.forEach(r => {
                    const opt = document.createElement('option');
                    opt.value = r.regionId;
                    opt.innerText = r.fullName;
                    appRegionSelect.appendChild(opt);
                });
            })
            .catch(err => console.error("Ошибка загрузки регионов:", err));
    }

// 2. Обработчик выбора региона — подгружает соответствующие районы
if (appRegionSelect) {
    appRegionSelect.addEventListener('change', function() {
        const selectedRegionId = this.value;

        // Очищаем старые районы и блокируем список на время загрузки
        appDistrictSelect.innerHTML = '<option value="" disabled selected>Загрузка районов...</option>';
        appDistrictSelect.disabled = true;

        // Запрашиваем районы выбранного региона
        fetch(`/api/map/districts/${selectedRegionId}`)
            .then(res => res.json())
            .then(districts => {
                appDistrictSelect.innerHTML = '<option value="" disabled selected>Выберите район расположения</option>';
                
                if (districts.length === 0) {
                    appDistrictSelect.innerHTML = '<option value="" disabled selected>В этом регионе нет районов</option>';
                    return;
                }

                districts.forEach(d => {
                    const opt = document.createElement('option');
                    opt.value = d.districtId;      // ID района для будущей отправки в БД
                    opt.innerText = d.districtName; // Название района
                    appDistrictSelect.appendChild(opt);
                });

                appDistrictSelect.disabled = false; // Разблокируем список районов
            })
            .catch(err => {
                console.error("Ошибка загрузки районов:", err);
                appDistrictSelect.innerHTML = '<option value="" disabled selected>Ошибка загрузки</option>';
            });
    });
}



// Функция, которая настраивает кнопки на сайте в зависимости от того, вошел ли пользователь
function checkUserAuth() {
    const currentUser = JSON.parse(localStorage.getItem('volunteer_user'));
    const viewAppsBtn = document.getElementById('view-apps-btn'); // Кнопка админа

    if (currentUser) {
        // Пользователь вошел в систему
        if (accountBtn) accountBtn.style.display = 'none';
        if (logoutBtn) logoutBtn.style.display = 'block';
        if (userEmailDisplay) {
            userEmailDisplay.innerText = currentUser.email;
            userEmailDisplay.style.display = 'block';
        }
        if (addCenterBtn) addCenterBtn.style.display = 'block';

        // Если вошел Администратор, показываем кнопку модерации заявок
        if (currentUser.role === 'Admin' && viewAppsBtn) {
            viewAppsBtn.style.display = 'block';
        } else if (viewAppsBtn) {
            viewAppsBtn.style.display = 'none';
        }
    } else {
        // Пользователь НЕ вошел в систему
        if (accountBtn) accountBtn.style.display = 'block';
        if (logoutBtn) logoutBtn.style.display = 'none';
        if (userEmailDisplay) {
            userEmailDisplay.innerText = '';
            userEmailDisplay.style.display = 'none';
        }
        if (addCenterBtn) addCenterBtn.style.display = 'none';
        if (viewAppsBtn) viewAppsBtn.style.display = 'none';
    }
}

// Запускаем проверку авторизации сразу при загрузке страницы
checkUserAuth();

// Обработка РЕГИСТРАЦИИ
if (registerForm) {
    registerForm.addEventListener('submit', function(e) {
        e.preventDefault();
        
        const email = document.getElementById('register-email').value;
        const password = document.getElementById('register-password').value;
        const confirmPassword = document.getElementById('register-confirm-password').value;

        if (password !== confirmPassword) {
            alert("Пароли не совпадают!");
            return;
        }

        fetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: email, password: password })
        })
        .then(async response => {
            const data = await response.json();
            if (!response.ok) throw new Error(data.message || 'Ошибка регистрации');
            return data;
        })
        .then(data => {
            alert(data.message);
            // Переключаем на окно входа
            if (toLoginBtn) toLoginBtn.click();
        })
        .catch(err => alert(err.message));
    });
}

// Обработка ВХОДА
if (loginForm) {
    loginForm.addEventListener('submit', function(e) {
        e.preventDefault();

        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;

        fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: email, password: password })
        })
        .then(async response => {
            const data = await response.json();
            if (!response.ok) throw new Error(data.message || 'Неверный логин или пароль');
            return data;
        })
        .then(data => {
            alert(data.message);
            // Сохраняем пользователя в локальное хранилище браузера
            localStorage.setItem('volunteer_user', JSON.stringify({
                email: data.email,
                role: data.role,
                userId: data.userId
            }));
            
            hideCustomModal(authModal);
            checkUserAuth(); // Обновляем кнопки на главной
        })
        .catch(err => alert(err.message));
    });
}

// Обработка ВЫХОДА из аккаунта
if (logoutBtn) {
    logoutBtn.addEventListener('click', () => {
        localStorage.removeItem('volunteer_user');
        checkUserAuth(); // Сбрасываем интерфейс
        location.reload(); // Перезагружаем страницу для очистки состояний
    });
}

// ==========================================
// 2. ЛОГИКА ДЛЯ МОДАЛЬНЫХ ОКЕН (АВТОРИЗАЦИЯ)
// ==========================================
function showCustomModal(modal) {
    modal.style.display = 'flex';
    setTimeout(() => modal.style.opacity = '1', 10);
}

function hideCustomModal(modal) {
    modal.style.opacity = '0';
    setTimeout(() => modal.style.display = 'none', 400);
}

accountBtn.addEventListener('click', () => showCustomModal(authModal));
closeAuthBtn.addEventListener('click', () => hideCustomModal(authModal));

    if (addCenterBtn) {
        // Используем onclick напрямую, чтобы сбросить любые старые конфликтующие слушатели
        addCenterBtn.onclick = function () {
            console.log("Пользователь нажал 'Добавить центр' (Первый клик). Инициализируем форму...");

            const addCenterModal = document.getElementById('add-center-modal');
            if (!addCenterModal) {
                alert("Ошибка: Элемент #add-center-modal не найден на странице!");
                return;
            }

            // 1. Плавный вывод модального окна на экран
            showCustomModal(addCenterModal);

            // 2. Полный принудительный сброс формы к исходному состоянию
            if (appForm) appForm.reset();

            // Жестко зануляем оба скрытых ID, чтобы форма не думала, что это редактирование
            const editAppField = document.getElementById('edit-app-id');
            const editCenterField = document.getElementById('edit-center-id');
            if (editAppField) editAppField.value = "";
            if (editCenterField) editCenterField.value = "";

            // Возвращаем стандартные пользовательские заголовки
            const modalTitle = addCenterModal.querySelector('.modal-title');
            if (modalTitle) modalTitle.innerText = "Подать заявку на создание центра";

            const submitBtn = addCenterModal.querySelector('button[type="submit"]') || addCenterModal.querySelector('.action-btn');
            if (submitBtn) submitBtn.innerText = "Отправить на модерацию";

            // Очищаем и блокируем списки районов
            const appRegionSelect = document.getElementById('app-region');
            const appDistrictSelect = document.getElementById('app-district');

            if (appRegionSelect) appRegionSelect.value = "";
            if (appDistrictSelect) {
                appDistrictSelect.innerHTML = '<option value="" disabled selected>Сначала выберите регион</option>';
                appDistrictSelect.disabled = true;
            }

            // 3. Запускаем асинхронную подгрузку регионов из базы данных
            loadRegionsToForm();
        };
    }
    if (closeAddModalBtn) {
        closeAddModalBtn.onclick = function () {
            console.log("Клик по крестику отмены формы. Анализируем состояние экрана...");

            // 1. Находим и закрываем саму форму изменения
            const addCenterModal = document.getElementById('add-center-modal');
            if (addCenterModal) {
                hideCustomModal(addCenterModal);
            }

            // 2. Проверяем, правили ли мы готовый центр с карты или поиска
            const editCenterIdField = document.getElementById('edit-center-id');
            const editCenterId = editCenterIdField ? editCenterIdField.value : "";
            const backBtnElem = document.getElementById('back-button');

            // НОВОЕ: Проверяем, открыт ли в данный момент экран со списком карточек волонтеров
            const centersView = document.getElementById('centers-view');
            const isCardsListOpen = centersView && (centersView.style.display === 'block' || centersView.style.opacity === '1');

            if (editCenterId && editCenterId !== "") {
                // КНОПКА ДОЛЖНА ПОЯВИТЬСЯ ТОЛЬКО ЕСЛИ МЫ НАХОДИМСЯ ВНУТРИ СПИСКА КАРТОЧЕК РАЙОНА
                if (isCardsListOpen) {
                    console.log("Админ отменил редактирование внутри списка карточек. Возвращаем кнопку 'Назад к карте'...");
                    if (backBtnElem) {
                        backBtnElem.style.display = 'block';
                        setTimeout(() => {
                            backBtnElem.style.opacity = '1';
                            backBtnElem.style.pointerEvents = 'auto';
                            backBtnElem.classList.add('visible');
                        }, 50);
                    }
                } else {
                    // ЕСЛИ МЫ БЫЛИ НА КАРТЕ РОССИИ (НАПРИМЕР, НАШЛИ ЧЕРЕЗ ПОИСК) — КНОПКА ОСТАЕТСЯ СКРЫТОЙ
                    console.log("Админ отменил редактирование на карте России. Кнопка 'Назад к карте' не требуется.");
                    if (backBtnElem) {
                        backBtnElem.style.display = 'none';
                        backBtnElem.style.opacity = '0';
                        backBtnElem.style.pointerEvents = 'none';
                        backBtnElem.classList.remove('visible');
                    }
                }
            }
        };
    }

// Функция управления видимостью верхней панели (поиск, кнопки, личный кабинет)
function toggleAuthPanel(show) {
    const authPanel = document.querySelector('.auth-panel');
    if (!authPanel) return;

    if (show) {
        authPanel.style.display = 'flex';
        // Даем микропаузу для запуска плавной анимации opacity
        setTimeout(() => {
            authPanel.style.transition = 'opacity 0.5s ease';
            authPanel.style.opacity = '1';
            authPanel.style.pointerEvents = 'auto';
        }, 10);
    } else {
        authPanel.style.transition = 'opacity 0.4s ease';
        authPanel.style.opacity = '0';
        authPanel.style.pointerEvents = 'none';
        // Полностью убираем из DOM через 400мс, чтобы элементы не перехватывали фокус
        setTimeout(() => {
            if (authPanel.style.opacity === '0') {
                authPanel.style.display = 'none';
            }
        }, 400);
    }
}

fetch('Blank_map_of_Russia-gray.svg')   
    .then(res => res.text())
    .then(data => {
        wrapper.innerHTML = data;
        const svg = wrapper.querySelector('svg');
        const paths = svg.querySelectorAll('path');
    
        paths.forEach(path => {
            if (path.id.toLowerCase().includes('border')) {
                path.style.pointerEvents = 'none';
                return;
            }

            const rawId = path.getAttribute('id') || "";
            const name = (path.getAttribute('title') || rawId || "РЕГИОН").replace(/_/g, ' ');

            path.addEventListener('mouseenter', () => {
                tooltip.innerText = name;
                tooltip.style.opacity = '1';
            });

            path.addEventListener('mousemove', (e) => {
                tooltip.style.left = e.clientX + 20 + 'px';
                tooltip.style.top = e.clientY + 20 + 'px';
            });

            path.addEventListener('mouseleave', () => tooltip.style.opacity = '0');

            path.addEventListener('click', (e) => {

                    if (document.body.classList.contains('scanning')) return;
                        e.stopPropagation();

                        // Прячем всю верхнюю панель управления (кнопки, поиск, почту)
                        toggleAuthPanel(false); 
                // 1. Плавно гасим карту России
                wrapper.style.transition = 'opacity 0.6s ease';
                wrapper.style.opacity = '0';
                wrapper.style.pointerEvents = 'none';

                // 2. ФИЗИЧЕСКИ убираем её через 600мс, чтобы нельзя было кликнуть
                setTimeout(() => {
                    if (wrapper.style.opacity === '0') {
                        wrapper.style.display = 'none';
                    }
                }, 600);
                tooltip.style.opacity = '0';
                tooltip.style.visibility = 'hidden';
                document.body.classList.add('scanning');
                
                if (rawId === 'RU-KEM' || name.includes('Кемеровская')) {
                    fetch('Outline_Map_of_Kemerovo_Oblast.svg')
                        .then(r => r.text())
                        .then(svgKEM => {
                            regionalContainer.innerHTML = svgKEM;
                            regionalContainer.style.display = 'block';

                            document.body.classList.remove('scanning');

                            const kemSvg = regionalContainer.querySelector('svg');
                            if (kemSvg) {
                                kemSvg.style.pointerEvents = 'all';
                                
                                const allPaths = kemSvg.querySelectorAll('path');
                                allPaths.forEach(el => {
                                    const label = el.getAttribute('inkscape:label') || "";

                                    if (label !== "Border") {
                                        el.style.cursor = 'pointer';
                                        
                                        el.onmouseenter = () => {
                                            tooltip.innerText = label;
                                            tooltip.style.opacity = '1';
                                            tooltip.style.visibility = 'visible';
                                        };
                                       
                                        el.onmousemove = (ev) => {
                                            tooltip.style.left = ev.clientX + 20 + 'px';
                                            tooltip.style.top = ev.clientY + 20 + 'px';
                                        };

                                        el.onmouseleave = () => {
                                            tooltip.style.opacity = '0';
                                            tooltip.style.visibility = 'hidden';
                                        };

                                        el.onclick = (ev) => {
                                            ev.stopPropagation();
                                            regionalContainer.classList.add('fade-out');
                                            //backBtn.classList.remove('visible');

                                            fetch(`/api/map/centers-by-district?name=${encodeURIComponent(label)}`)
                                                .then(res => res.json())
                                                .then(data => {
                                                    setTimeout(() => {
                                                        regionalContainer.style.display = 'none';
                                                        regionalContainer.classList.remove('fade-out');
                                                        renderCenters(data); 
                                                    }, 600);
                                                });
                                        };
                                    }
                                });
                            }

                            setTimeout(() => {
                                regionalContainer.style.opacity = '1';
                                backBtn.classList.add('visible');
                            }, 800);
                        });
                } else {
                    titleDisplay.innerText = name;
                    setTimeout(() => {
                        titleDisplay.classList.add('visible');
                        backBtn.classList.add('visible');
                    }, 100);
                }
            });
        });
    });

backBtn.addEventListener('click', () => {
    const centersView = document.getElementById('centers-view');

    if (centersView && centersView.style.display === 'block') {
        centersView.style.display = 'none';
        centersView.style.opacity = '0';
        regionalContainer.style.display = 'block';
        setTimeout(() => regionalContainer.style.opacity = '1', 50);
        return; 
    }

    if (regionalContainer && regionalContainer.style.display === 'block') {
        closeEverythingAndShowRussia();
        return;
    }

    if (titleDisplay && titleDisplay.classList.contains('visible')) {
        closeEverythingAndShowRussia();
        return;
    }
});

    function closeEverythingAndShowRussia() {
        // 1. Сначала плавно гасим все текущие активные элементы
        regionalContainer.style.opacity = '0';
        regionalContainer.style.pointerEvents = 'none'; // Отключаем клики по области
        titleDisplay.classList.remove('visible');
        backBtn.classList.remove('visible');

        setTimeout(() => {
            // 2. Полностью убираем контейнеры из видимости
            regionalContainer.style.display = 'none';
            regionalContainer.innerHTML = '';
            titleDisplay.innerText = '';

            // 3. Возвращаем карту России
            wrapper.style.display = 'block'; // Сначала возвращаем физически

            // Даем браузеру 50мс, чтобы он "заметил" появление блока, и включаем анимацию
            setTimeout(() => {
                wrapper.style.opacity = '1';
                wrapper.style.pointerEvents = 'auto'; // ВКЛЮЧАЕМ КЛИКИ ПО РОССИИ
                wrapper.classList.remove('map-hidden');
                document.body.classList.remove('scanning');
                tooltip.style.visibility = 'visible';
                // ВОЗВРАЩАЕМ панель управления на главной карте
                toggleAuthPanel(true); 
            }, 50);

        }, 500); // Это время должно совпадать с transition в CSS (0.5s)
    }

function renderCenters(data) {
    const list = document.getElementById('centers-list');
    const centersView = document.getElementById('centers-view');
    centersView.style.display = 'block';
    centersView.style.opacity = '1';
    list.innerHTML = '';
    wrapper.classList.add('map-hidden');
    data.forEach((c, index) => {
        const card = document.createElement('div');
        card.className = 'center-card';
        card.innerHTML = `
            ${c.imageUrl ? `<img src="${c.imageUrl}" onerror="this.style.display='none'">` : '<div class="no-photo">Нет фото</div>'}
            <h2>${c.name}</h2>
            <div class="card-description">${c.description || ''}</div>
            <button class="more-btn" style="background:#e50914; color:white; border:none; padding:8px 15px; border-radius:4px; cursor:pointer;">Подробнее</button>
        `;
        card.onclick = () => openFullView(c);
        list.appendChild(card);
        setTimeout(() => card.classList.add('animate'), index * 100);
    });
}

    // Глобальная переменная для хранения текущего открытого центра (нужна кнопкам админа)
    let currentActiveCenter = null;

    function openFullView(center) {
        console.log("Открываем карточку (сырые данные):", center);
        currentActiveCenter = center; // Сохраняем объект глобально для кнопок изменения/удаления

        const modal = document.getElementById('modal-overlay');
        const body = document.getElementById('modal-body');
        const closeBtn = document.getElementById('close-modal');
        const backBtnElem = document.getElementById('back-button');
        const adminPanel = document.getElementById('admin-fixed-panel');
        const editBtn = document.getElementById('admin-edit-center-btn');
        const deleteBtn = document.getElementById('admin-delete-center-btn');

        if (backBtnElem) {
            backBtnElem.style.opacity = '0';
            backBtnElem.style.pointerEvents = 'none';
        }

        if (closeBtn) {
            closeBtn.style.display = 'flex';
            setTimeout(() => closeBtn.style.opacity = '1', 10);
        }

        // Нормализация входящих данных (Регистронезависимость)
        const cId = center.centerId || center.CenterId || center.id;
        const cName = center.name || center.Name || "";
        const cDesc = center.description || center.Description || "Описание отсутствует";
        const cAddr = center.address || center.Address || "Адрес не указан";
        const cCont = center.contacts || center.Contacts || "Контакты не указаны";
        const cImg = center.imageUrl || center.ImageUrl || "";
        const dId = center.districtId || center.DistrictId || "";

        // Отрисовка текстового контента карточки
        body.innerHTML = `
        ${cImg ? `<img src="${cImg}" style="width:100%; height:400px; object-fit:cover; border-radius: 15px 15px 0 0;" onerror="this.style.display='none'">` : ''}
        <div style="padding: 40px; background:#141414;">
            <h1 style="color:#e50914; margin-top:0;">${cName}</h1>
            <p style="font-size:1.1em; line-height:1.6; color: #fff;">${cDesc}</p>
            <div style="margin-top:30px; padding-top:20px; border-top:1px solid #333;">
                <p>📍 ${cAddr}</p>
                <p>📞 ${cCont}</p>
            </div>
        </div>
    `;

        // ПРОВЕРКА РОЛИ ПОЛЬЗОВАТЕЛЯ ДЛЯ УПРАВЛЕНИЯ ПАНЕЛЬЮ
        const currentUser = JSON.parse(localStorage.getItem('volunteer_user'));

        if (adminPanel) {
            // Панель включаем ВСЕГДА, так как внутри неё теперь лежит крестик закрытия
            adminPanel.style.display = 'flex';

            if (currentUser && currentUser.role === 'Admin') {
                // Если вошел АДМИНИСТРАТОР — показываем оранжевую и красную кнопки управления
                if (editBtn) editBtn.style.display = 'block';
                if (deleteBtn) deleteBtn.style.display = 'block';

                // 1. НАВЕШИВАЕМ ЛОГИКУ НА КНОПКУ "УДАЛИТЬ"
                if (deleteBtn) {
                    deleteBtn.onclick = () => {
                        if (!cId) {
                            alert("Ошибка: Не удалось определить ID центра для удаления.");
                            return;
                        }
                        if (confirm(`Вы уверены, что хотите НАВСЕГДА удалить центр "${cName}" из системы?`)) {
                            fetch(`/api/map/delete-center/${cId}`, { method: 'DELETE' })
                                .then(res => res.json())
                                .then(data => {
                                    alert(data.message);
                                    document.getElementById('close-modal').click();
                                    location.reload();
                                })
                                .catch(err => alert("Ошибка при удалении центра"));
                        }
                    };
                }

                // 2. НАВЕШИВАЕМ ЛОГИКУ НА КНОПКУ "ИЗМЕНИТЬ"
                if (editBtn) {
                    editBtn.onclick = () => {
                        console.log("Админ нажал Изменить. Начинаем точечное заполнение формы...");

                        // Скрываем и гасим карточку, чтобы освободить экран для формы
                        if (modal) { modal.style.opacity = '0'; modal.style.display = 'none'; }
                        if (closeBtn) closeBtn.style.display = 'none';
                        if (adminPanel) adminPanel.style.display = 'none';

                        const addModal = document.getElementById('add-center-modal');
                        if (!addModal) {
                            alert("Критическая ошибка: Элемент #add-center-modal не найден на странице!");
                            return;
                        }

                        showCustomModal(addModal);
                        document.body.style.overflow = 'hidden'; // Фиксируем скролл фона

                        // Настройка заголовков формы редактирования
                        const modalTitle = addModal.querySelector('.modal-title');
                        if (modalTitle) modalTitle.innerText = "Редактирование волонтерского центра";

                        const submitBtn = addModal.querySelector('button[type="submit"]') || addModal.querySelector('.action-btn');
                        if (submitBtn) submitBtn.innerText = "Сохранить изменения";

                        // Запись скрытых ID в поля по их уникальным идентификаторам
                        if (document.getElementById('edit-center-id')) document.getElementById('edit-center-id').value = cId;
                        if (document.getElementById('edit-app-id')) document.getElementById('edit-app-id').value = "";

                        // Заполняем текстовые инпуты формы значениями центра
                        const inputName = document.getElementById('app-name');
                        const inputDesc = document.getElementById('app-description');
                        const inputAddr = document.getElementById('app-address');
                        const inputCont = document.getElementById('app-contacts');
                        const inputImg = document.getElementById('app-image');

                        if (inputName) { inputName.value = cName; console.log("Успех! Имя записано в поле:", cName); }
                        if (inputDesc) inputDesc.value = cDesc;
                        if (inputAddr) inputAddr.value = cAddr;
                        if (inputCont) inputCont.value = cCont;
                        if (inputImg) inputImg.value = cImg;

                        // Автозаполнение связанных списков регионов и районов
                        const modalRegionSelect = document.getElementById('app-region');
                        const modalDistrictSelect = document.getElementById('app-district');

                        if (modalRegionSelect && modalDistrictSelect) {
                            loadRegionsToForm().then(() => {
                                const rId = currentActiveCenter.regionId || currentActiveCenter.RegionId;

                                if (rId) {
                                    modalRegionSelect.value = rId;
                                    modalDistrictSelect.innerHTML = '<option value="" disabled selected>Загрузка районов...</option>';
                                    modalDistrictSelect.disabled = true;

                                    return fetch(`/api/map/districts/${rId}`);
                                } else {
                                    modalRegionSelect.value = "";
                                    modalDistrictSelect.innerHTML = '<option value="" disabled selected>Заново выберите регион для смены района</option>';
                                    modalDistrictSelect.disabled = true;
                                    return null;
                                }
                            })
                                .then(res => {
                                    if (!res) return;
                                    return res.json();
                                })
                                .then(districts => {
                                    if (!districts) return;
                                    modalDistrictSelect.innerHTML = '<option value="" disabled selected>Выберите район расположения</option>';

                                    districts.forEach(d => {
                                        const opt = document.createElement('option');
                                        opt.value = d.districtId;
                                        opt.innerText = d.districtName;
                                        if (String(d.districtId) === String(dId)) {
                                            opt.selected = true;
                                        }
                                        modalDistrictSelect.appendChild(opt);
                                    });
                                    modalDistrictSelect.disabled = false;
                                })
                                .catch(err => {
                                    console.error("Ошибка автоподгрузки списков регионов/районов:", err);
                                    modalDistrictSelect.innerHTML = '<option value="" disabled selected>Ошибка загрузки</option>';
                                });
                        }
                    };
                }
            } else {
                // Если зашел ОБЫЧНЫЙ ПОЛЬЗОВАТЕЛЬ или Гость — принудительно прячем оранжевую и красную кнопки, оставляя только крестик по центру
                if (editBtn) editBtn.style.display = 'none';
                if (deleteBtn) deleteBtn.style.display = 'none';
            }
        }

        modal.style.display = 'flex';
        document.body.style.overflow = 'hidden';

        setTimeout(() => {
            modal.style.opacity = '1';
        }, 10);
    }
    // ОБРАБОТЧИК КЛИКА ПО КРЕСТИКУ ЗАКРЫТИЯ КАРТОЧКИ
    document.getElementById('close-modal').onclick = function () {
        const modal = document.getElementById('modal-overlay');
        const closeBtn = document.getElementById('close-modal');
        const backBtnElem = document.getElementById('back-button');
        const adminPanel = document.getElementById('admin-fixed-panel');

        if (modal) modal.style.opacity = '0';
        if (adminPanel) adminPanel.style.display = 'none'; // Прячем всю нижнюю панель целиком

        setTimeout(() => {
            if (modal) modal.style.display = 'none';
            document.body.style.overflow = 'auto'; // Возвращаем прокрутку страницы

            if (backBtnElem) {
                backBtnElem.style.opacity = '1';
                backBtnElem.style.display = 'block';
                backBtnElem.style.pointerEvents = 'auto';
            }
        }, 400);
    };
</script>
