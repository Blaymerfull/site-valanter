<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Russia Map | Focused Region</title>
    <style>
        body {
    margin: 0;
    background-color: #050505;
    color: #fff;
    font-family: 'Courier New', Courier, monospace;
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
}

#map-wrapper {
    width: 90vw;
    height: 80vh;
    transition: opacity 0.8s ease; 
}

svg { 
    width: 100%; 
    height: 100%; 
    pointer-events: all; 
    transform-origin: 0 0 !important; 
    transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
}

path {
    fill: #0a0a0a !important;
    stroke: #333 !important;
    stroke-width: 0.5;
    transition: fill 0.3s, stroke 0.3s, opacity 0.8s ease;
    cursor: pointer;
    vector-effect: non-scaling-stroke; 
}

path:hover {
    fill: #111 !important;
    stroke: #fff !important;
}

.focused-region {
    fill: #151515 !important;
    stroke: #fff !important;
    stroke-width: 1.5;
    filter: drop-shadow(0 0 25px rgba(255, 255, 255, 0.5));
    pointer-events: none;
}

.scanner-corner {
    position: fixed;
    width: 40px; height: 40px;
    border: 1px solid #fff;
    opacity: 0;
    transition: 0.5s;
    z-index: 100;
}
#tl { top: 30px; left: 30px; border-right: none; border-bottom: none; }
#tr { top: 30px; right: 30px; border-left: none; border-bottom: none; }
#bl { bottom: 30px; left: 30px; border-right: none; border-top: none; }
#br { bottom: 30px; right: 30px; border-left: none; border-top: none; }

.scanning .scanner-corner { 
    opacity: 1; 
    animation: cornerPulse 2s infinite alternate ease-in-out;
}

@keyframes cornerPulse {
    from { transform: scale(1); opacity: 0.5; }
    to { transform: scale(1.1); opacity: 1; }
}

#tooltip {
    position: fixed;
    pointer-events: none;
    background: #000;
    border: 1px solid #fff;
    padding: 8px 15px;
    text-transform: uppercase;
    letter-spacing: 2px;
    font-size: 12px;
    opacity: 0;
    z-index: 1000;
}

#back-button {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    background: #000;
    border: 1px solid #fff;
    color: #fff;
    padding: 12px 30px;
    cursor: pointer;
    opacity: 0;
    visibility: hidden;
    transition: 0.5s;
    z-index: 1000 !important;
    letter-spacing: 4px;
}
#back-button.visible { opacity: 1; visibility: visible; }
#back-button:hover { background: #fff; color: #000; }

#region-title-display {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 4vw;
    font-weight: 100;
    text-transform: uppercase;
    letter-spacing: 15px;
    color: #fff;
    opacity: 0;
    z-index: 500;
    text-align: center;
    pointer-events: none;
    transition: all 2s cubic-bezier(0.19, 1, 0.22, 1);
    filter: blur(10px);
}

#region-title-display.visible {
    opacity: 1;
    filter: blur(0);
    letter-spacing: 25px;
    text-shadow: 0 0 30px rgba(255, 255, 255, 0.6);
}

.map-hidden {
    opacity: 0 !important;
    transform: scale(1.2);
    transition: opacity 1s ease, transform 1.5s ease-in !important;
    pointer-events: none !important; 
}

#regional-map-container path {
    fill: #919191 !important;
    stroke: rgba(255, 255, 255, 0.3) !important;
    stroke-width: 0.5px !important;
    transition: all 0.4s ease;
    vector-effect: non-scaling-stroke;
}

#regional-map-container path:hover {
    fill: #383838 !important;
    stroke: #ffffff !important;
    stroke-width: 1px !important;
    filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.8)) !important;
    cursor: pointer;
}

#regional-map-container [inkscape\:label="Border"],
#regional-map-container [id="path5"] {
    fill: none !important;
    stroke: #444444 !important;
    stroke-width: 1.5px !important;
    pointer-events: none !important;
    filter: none !important;
}

#regional-map-container svg {
    background: transparent !important;
}

.centers-hidden {
    display: none;
    opacity: 0;
    transition: opacity 0.8s ease;
}

.centers-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
    padding: 40px;
}

.center-card {
    background: #1a1a1a; 
    border: 1px solid rgba(255, 255, 255, 0.1);
    will-change: transform, opacity;
    border-radius: 12px;
    padding: 25px;
    color: white;
    opacity: 0;
    transform: translateY(30px);
    transition: transform 0.3s ease, background 0.3s ease;
}

.center-card:hover {
    transform: scale(1.05);
    background: rgba(255, 255, 255, 0.1);
}

.fade-out {
    opacity: 0 !important;
    pointer-events: none;
}

#regional-map-container, #map-wrapper {
    pointer-events: auto !important;
}

#regional-map-container svg path, #map-wrapper svg path {
    pointer-events: auto !important;
    cursor: pointer;
}

.hidden-completely {
    display: none !important;
}

#centers-view {
    position: relative;
    z-index: 10;
    width: 100%;
    min-height: 100vh;
}

.centers-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 30px;
    padding: 60px 10%;
}

.center-card {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    padding: 25px;
    color: white;
    opacity: 0;
    transform: translateY(30px);
    transition: transform 0.4s ease, background 0.4s ease, border-color 0.4s ease;
}

.center-card.animate {
    animation: reveal 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
}

@keyframes reveal {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.center-card:hover {
    background: rgba(255, 255, 255, 0.12);
    border-color: #e50914;
    transform: scale(1.03);
    cursor: pointer;
}

.center-card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    border-radius: 8px;
    margin-bottom: 15px;
}

.card-description {
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 15px;
    font-size: 0.9em;
    opacity: 0.8;
}

#modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: rgba(0, 0, 0, 0.95);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 99999;
    opacity: 0;
    transition: opacity 0.4s ease;
}
.modal-content {
    background: #141414;
    width: 90%;
    max-width: 900px;
    height: auto;
    max-height: 85vh;
    border-radius: 15px;
    overflow-y: auto;
    position: relative;
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 0 50px rgba(0,0,0,1);
    animation: modalSlideUp 0.5s ease;
    padding-bottom: 100px;
}

.close-modal {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    width: 60px;
    height: 60px;
    display: none;
    align-items: center;
    justify-content: center;
    color: #e50914;
    font-size: 50px;
    line-height: 0;
    padding-bottom: 8px;
    cursor: pointer;
    z-index: 1000001;
    transition: transform 0.3s ease;
}

.close-modal:hover {
    transform: translateX(-50%) scale(1.2);
    color: white;
}

@keyframes modalSlideUp {
    from { transform: translateY(50px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}
    </style>
</head>
<body>

    <div id="tl" class="scanner-corner"></div>
    <div id="tr" class="scanner-corner"></div>
    <div id="bl" class="scanner-corner"></div>
    <div id="br" class="scanner-corner"></div>

    <div id="tooltip"></div>
    <button id="back-button">НАЗАД К КАРТЕ</button>
    <div id="map-wrapper"></div>
    <div id="region-title-display"></div>
    <div id="regional-map-container" style="position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); width:70vw; height:70vh; display:none; opacity:0; transition: opacity 1s; z-index: 501;"></div>
    <div id="centers-view" class="centers-hidden">
        <div id="centers-list" class="centers-grid"></div>
    </div>
    <div id="modal-overlay" style="display:none;">
        <span id="close-modal" class="close-modal">&times;</span>
        <div class="modal-content" id="modal-body"></div>
    </div>

<script>
   const wrapper = document.getElementById('map-wrapper');
const tooltip = document.getElementById('tooltip');
const backBtn = document.getElementById('back-button');
const titleDisplay = document.getElementById('region-title-display');
const regionalContainer = document.getElementById('regional-map-container'); 

fetch('Blank_map_of_Russia-gray.svg')   
    .then(res => res.text())
    .then(data => {
        wrapper.innerHTML = data;
        const svg = wrapper.querySelector('svg');
        const paths = svg.querySelectorAll('path');
    
        paths.forEach(path => {
            if (path.id.toLowerCase().includes('border')) {
                path.style.pointerEvents = 'none';
                return;
            }

            const rawId = path.getAttribute('id') || "";
            const name = (path.getAttribute('title') || rawId || "РЕГИОН").replace(/_/g, ' ');

            path.addEventListener('mouseenter', () => {
                tooltip.innerText = name;
                tooltip.style.opacity = '1';
            });

            path.addEventListener('mousemove', (e) => {
                tooltip.style.left = e.clientX + 20 + 'px';
                tooltip.style.top = e.clientY + 20 + 'px';
            });

            path.addEventListener('mouseleave', () => tooltip.style.opacity = '0');

            path.addEventListener('click', (e) => {
                // 1. Плавно гасим карту России
                wrapper.style.transition = 'opacity 0.6s ease';
                wrapper.style.opacity = '0';
                wrapper.style.pointerEvents = 'none';

                // 2. ФИЗИЧЕСКИ убираем её через 600мс, чтобы нельзя было кликнуть
                setTimeout(() => {
                    if (wrapper.style.opacity === '0') {
                        wrapper.style.display = 'none';
                    }
                }, 600);
                tooltip.style.opacity = '0';
                tooltip.style.visibility = 'hidden';
                document.body.classList.add('scanning');
                
                if (rawId === 'RU-KEM' || name.includes('Кемеровская')) {
                    fetch('Outline_Map_of_Kemerovo_Oblast.svg')
                        .then(r => r.text())
                        .then(svgKEM => {
                            regionalContainer.innerHTML = svgKEM;
                            regionalContainer.style.display = 'block';

                            document.body.classList.remove('scanning');

                            const kemSvg = regionalContainer.querySelector('svg');
                            if (kemSvg) {
                                kemSvg.style.pointerEvents = 'all';
                                
                                const allPaths = kemSvg.querySelectorAll('path');
                                allPaths.forEach(el => {
                                    const label = el.getAttribute('inkscape:label') || "";

                                    if (label !== "Border") {
                                        el.style.cursor = 'pointer';
                                        
                                        el.onmouseenter = () => {
                                            tooltip.innerText = label;
                                            tooltip.style.opacity = '1';
                                            tooltip.style.visibility = 'visible';
                                        };
                                       
                                        el.onmousemove = (ev) => {
                                            tooltip.style.left = ev.clientX + 20 + 'px';
                                            tooltip.style.top = ev.clientY + 20 + 'px';
                                        };

                                        el.onmouseleave = () => {
                                            tooltip.style.opacity = '0';
                                            tooltip.style.visibility = 'hidden';
                                        };

                                        el.onclick = (ev) => {
                                            ev.stopPropagation();
                                            regionalContainer.classList.add('fade-out');
                                            //backBtn.classList.remove('visible');

                                            fetch(`/api/map/centers-by-district?name=${encodeURIComponent(label)}`)
                                                .then(res => res.json())
                                                .then(data => {
                                                    setTimeout(() => {
                                                        regionalContainer.style.display = 'none';
                                                        regionalContainer.classList.remove('fade-out');
                                                        renderCenters(data); 
                                                    }, 600);
                                                });
                                        };
                                    }
                                });
                            }

                            setTimeout(() => {
                                regionalContainer.style.opacity = '1';
                                backBtn.classList.add('visible');
                            }, 800);
                        });
                } else {
                    titleDisplay.innerText = name;
                    setTimeout(() => {
                        titleDisplay.classList.add('visible');
                        backBtn.classList.add('visible');
                    }, 100);
                }
            });
        });
    }); // <-- ИСПРАВЛЕНО: закрытие .then(data => { ... })

backBtn.addEventListener('click', () => {
    const centersView = document.getElementById('centers-view');

    if (centersView && centersView.style.display === 'block') {
        centersView.style.display = 'none';
        centersView.style.opacity = '0';
        regionalContainer.style.display = 'block';
        setTimeout(() => regionalContainer.style.opacity = '1', 50);
        return; 
    }

    if (regionalContainer && regionalContainer.style.display === 'block') {
        closeEverythingAndShowRussia();
        return;
    }

    if (titleDisplay && titleDisplay.classList.contains('visible')) {
        closeEverythingAndShowRussia();
        return;
    }
});

    function closeEverythingAndShowRussia() {
        // 1. Сначала плавно гасим все текущие активные элементы
        regionalContainer.style.opacity = '0';
        regionalContainer.style.pointerEvents = 'none'; // Отключаем клики по области
        titleDisplay.classList.remove('visible');
        backBtn.classList.remove('visible');

        setTimeout(() => {
            // 2. Полностью убираем контейнеры из видимости
            regionalContainer.style.display = 'none';
            regionalContainer.innerHTML = '';
            titleDisplay.innerText = '';

            // 3. Возвращаем карту России
            wrapper.style.display = 'block'; // Сначала возвращаем физически

            // Даем браузеру 50мс, чтобы он "заметил" появление блока, и включаем анимацию
            setTimeout(() => {
                wrapper.style.opacity = '1';
                wrapper.style.pointerEvents = 'auto'; // ВКЛЮЧАЕМ КЛИКИ ПО РОССИИ
                wrapper.classList.remove('map-hidden');
                document.body.classList.remove('scanning');
                tooltip.style.visibility = 'visible';
            }, 50);

        }, 500); // Это время должно совпадать с transition в CSS (0.5s)
    }

function renderCenters(data) {
    const list = document.getElementById('centers-list');
    const centersView = document.getElementById('centers-view');
    centersView.style.display = 'block';
    centersView.style.opacity = '1';
    list.innerHTML = '';
    wrapper.classList.add('map-hidden');
    data.forEach((c, index) => {
        const card = document.createElement('div');
        card.className = 'center-card';
        card.innerHTML = `
            ${c.imageUrl ? `<img src="${c.imageUrl}" onerror="this.style.display='none'">` : '<div class="no-photo">Нет фото</div>'}
            <h2>${c.name}</h2>
            <div class="card-description">${c.description || ''}</div>
            <button class="more-btn" style="background:#e50914; color:white; border:none; padding:8px 15px; border-radius:4px; cursor:pointer;">Подробнее</button>
        `;
        card.onclick = () => openFullView(c);
        list.appendChild(card);
        setTimeout(() => card.classList.add('animate'), index * 100);
    });
}

function openFullView(center) {
    console.log("Открываем карточку:", center.name);
    
    const modal = document.getElementById('modal-overlay');
    const body = document.getElementById('modal-body');
    const closeBtn = document.getElementById('close-modal');
    const backBtnElem = document.getElementById('back-button');

    if (backBtnElem) {
        backBtnElem.style.opacity = '0'; 
        backBtnElem.style.pointerEvents = 'none';
    }
    
    if (closeBtn) {
        closeBtn.style.display = 'flex';
        setTimeout(() => closeBtn.style.opacity = '1', 10);
    }

    body.innerHTML = `
        ${center.imageUrl ? `<img src="${center.imageUrl}" style="width:100%; height:400px; object-fit:cover; border-radius: 15px 15px 0 0;" onerror="this.style.display='none'">` : ''}
        <div style="padding: 40px;">
            <h1 style="color:#e50914; margin-top:0;">${center.name}</h1>
            <p style="font-size:1.1em; line-height:1.6; color: #fff;">${center.description || 'Описание отсутствует'}</p>
            <div style="margin-top:30px; padding-top:20px; border-top:1px solid #333;">
                <p>📍 ${center.address || 'Адрес не указан'}</p>
                <p>📞 ${center.contacts || 'Контакты не указаны'}</p>
            </div>
        </div>
    `;

    modal.style.display = 'flex';
    document.body.style.overflow = 'hidden'; 
    
    setTimeout(() => {
        modal.style.opacity = '1';
    }, 10);
} // <-- Закрытие функции openFullView (ИСПРАВЛЕНО)

// Функция закрытия модалки
document.getElementById('close-modal').onclick = function() {
    const modal = document.getElementById('modal-overlay');
    const closeBtn = document.getElementById('close-modal');
    const backBtnElem = document.getElementById('back-button'); // Используем то же имя, что и выше

    modal.style.opacity = '0';
    closeBtn.style.display = 'none';

    setTimeout(() => {
        modal.style.display = 'none';
        document.body.style.overflow = 'auto'; // Возвращаем скролл
        
        if (backBtnElem) {
            backBtnElem.style.opacity = '1';       // Возвращаем видимость
            backBtnElem.style.pointerEvents = 'auto'; // Возвращаем кликабельность
            backBtnElem.style.display = 'block';   // На всякий случай принудительно показываем
        }
    }, 400);
};

</script>
</body>
</html>
